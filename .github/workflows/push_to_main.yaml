# This workflow is triggered on push to the main branch and on pull requests
# to the main branch. It runs all tests, builds a Docker image, and deploys
# the test coverage report to GitHub Pages.
name: Validate pullreqs to main

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  run_tests:
    name: Compile application and run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/Checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
            distribution: 'zulu'
            java-version: '21'

      - name: Run all tests in project
        run: |
           cd task-service && mvn compile && mvn test
